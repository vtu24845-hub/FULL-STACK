<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>urban cart · advanced filter UI</title>
  <style>
    /* Clean, modern product UI — preserves layout & scripts */
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7fafc;--card:#ffffff;--muted:#5b6b7a;--accent:#0ea5a4;--soft:#f1f8f7}
    body{font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial;background:var(--bg);color:#12232f;padding:2rem 1.6rem;min-height:100vh}
    .shop-container{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:320px 1fr;gap:2rem}

    /* Sidebar */
    .filter-sidebar{background:var(--card);border-radius:16px;padding:1.6rem;border:1px solid rgba(2,6,23,0.04);box-shadow:0 14px 30px rgba(12,20,30,0.04);align-self:start;position:sticky;top:2rem}
    .filter-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.4rem}
    .filter-header h2{font-size:1.4rem;font-weight:800;background:linear-gradient(90deg,#0ea5a4,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .clear-btn{background:transparent;border:1px solid rgba(2,6,23,0.06);padding:0.35rem 0.9rem;border-radius:999px;font-weight:700;color:var(--accent);cursor:pointer}

    .filter-section{margin-bottom:1.6rem;padding-bottom:1rem;border-bottom:1px solid rgba(2,6,23,0.04)}
    .filter-section h3{font-size:1rem;font-weight:700;color:#0f3140;margin-bottom:0.8rem;display:flex;align-items:center;gap:0.4rem}

    /* Price slider */
    input[type=range]{width:100%;height:6px;background:linear-gradient(90deg,var(--accent) 0%,var(--accent) 40%,#e6f6f5 40%,#e6f6f5 100%);border-radius:8px}
    input[type=range]::-webkit-slider-thumb{appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid var(--accent);box-shadow:0 6px 12px rgba(14,165,164,0.14);margin-top:-6px}
    .price-inputs{display:flex;gap:0.6rem;margin-top:0.8rem}
    .price-inputs div{background:var(--soft);border-radius:999px;padding:0.35rem 0.8rem;display:flex;align-items:center;gap:0.4rem;border:1px solid rgba(2,6,23,0.03)}
    .price-inputs input{width:72px;border:none;background:transparent;font-weight:700;color:#0f3140}

    /* Color & brand */
    .color-grid{display:flex;flex-wrap:wrap;gap:0.6rem}
    .color-swatch{width:36px;height:36px;border-radius:50%;box-shadow:inset 0 -1px 0 rgba(0,0,0,0.06);border:2px solid #fff}
    .color-option{display:flex;flex-direction:column;align-items:center;font-size:0.8rem;color:var(--muted);cursor:pointer}

    .brand-list{display:flex;flex-direction:column;gap:0.6rem}
    .brand-item{display:flex;align-items:center;gap:0.6rem;color:#0f3140;font-weight:700}
    .brand-count{margin-left:auto;background:#eef8f7;padding:0.18rem 0.6rem;border-radius:999px;color:var(--accent);font-size:0.78rem}

    .rating-list{display:flex;flex-direction:column;gap:0.6rem}
    .stars{color:#fbbf24}

    /* Product listing area */
    .product-listing{display:flex;flex-direction:column;gap:1.6rem}
    .results-header{display:flex;justify-content:space-between;align-items:center;padding:1rem;border-radius:12px;background:linear-gradient(180deg,#ffffff,#fbfffe);border:1px solid rgba(2,6,23,0.04)}
    .results-header h1{font-size:1.25rem;font-weight:800;color:#0f3140}
    .results-header .sort{background:transparent;border:1px solid rgba(2,6,23,0.04);padding:0.4rem 0.8rem;border-radius:999px}

    .product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
    .product-card{background:var(--card);border-radius:12px;padding:1rem;border:1px solid rgba(2,6,23,0.04);display:flex;flex-direction:column;transition:transform .16s,box-shadow .16s}
    .product-card:hover{transform:translateY(-6px);box-shadow:0 18px 36px rgba(2,6,23,0.06)}
    .product-image{height:140px;border-radius:10px;background:linear-gradient(180deg,#f8faf9,#f1f7f6);display:flex;align-items:center;justify-content:center;font-size:2.6rem;border:1px solid rgba(2,6,23,0.03);margin-bottom:0.9rem}
    .product-brand{font-size:0.75rem;font-weight:800;color:#0ea5a4;text-transform:uppercase}
    .product-title{font-weight:800;font-size:1.05rem;color:#0f3140;margin:0.25rem 0}
    .product-price{font-weight:900;color:#0f3140;font-size:1.2rem;margin-top:auto}
    .product-footer{display:flex;justify-content:space-between;align-items:center;margin-top:0.8rem}
    .add-btn{background:var(--accent);color:white;padding:0.45rem 0.9rem;border-radius:999px;border:none;font-weight:800;cursor:pointer}

    @media (max-width:1200px){.product-grid{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:900px){.shop-container{grid-template-columns:1fr}.filter-sidebar{position:static}}
    @media (max-width:600px){.product-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="shop-container">

    <!-- FILTER SIDEBAR (advanced) -->
    <aside class="filter-sidebar">
      <div class="filter-header">
        <h2>filter</h2>
        <button class="clear-btn" id="clearFiltersBtn" type="button">✕ clear all</button>
      </div>

      <!-- 1. PRICE RANGE filter -->
      <section class="filter-section">
        <h3>💰 price range</h3>
        <div class="price-range">
          <div class="slider-container">
            <input type="range" id="priceSlider" min="0" max="500" value="250" step="5">
          </div>
          <div class="price-inputs">
            <div><span>$</span><input type="number" id="minPrice" value="0" min="0" max="500" step="5"></div>
            <div><span>$</span><input type="number" id="maxPrice" value="250" min="0" max="500" step="5"></div>
          </div>
        </div>
      </section>

      <!-- 2. COLOR PALETTE (grid of colors) -->
      <section class="filter-section">
        <h3>🎨 color palette</h3>
        <div class="color-grid" id="colorFilterContainer">
          <!-- dynamically built but static for demo, interaction via js -->
          <div class="color-option" data-color="black">
            <div class="color-swatch" style="background:#222;"></div>
            <span>black</span>
          </div>
          <div class="color-option" data-color="white">
            <div class="color-swatch" style="background:#f0f0f0; border:1px solid #ccc;"></div>
            <span>white</span>
          </div>
          <div class="color-option" data-color="navy">
            <div class="color-swatch" style="background:#1f2f54;"></div>
            <span>navy</span>
          </div>
          <div class="color-option" data-color="sage">
            <div class="color-swatch" style="background:#8a9b7e;"></div>
            <span>sage</span>
          </div>
          <div class="color-option" data-color="clay">
            <div class="color-swatch" style="background:#b66d5b;"></div>
            <span>clay</span>
          </div>
          <div class="color-option" data-color="sand">
            <div class="color-swatch" style="background:#dbb88c;"></div>
            <span>sand</span>
          </div>
        </div>
      </section>

      <!-- 3. BRAND SELECTION (checkboxes) -->
      <section class="filter-section">
        <h3>🏷️ brand</h3>
        <div class="brand-list" id="brandFilterContainer">
          <label class="brand-item">
            <input type="checkbox" value="urban"> urban craft <span class="brand-count">12</span>
          </label>
          <label class="brand-item">
            <input type="checkbox" value="nordic"> nordic pulse <span class="brand-count">8</span>
          </label>
          <label class="brand-item">
            <input type="checkbox" value="element"> element <span class="brand-count">6</span>
          </label>
          <label class="brand-item">
            <input type="checkbox" value="base"> base <span class="brand-count">9</span>
          </label>
          <label class="brand-item">
            <input type="checkbox" value="terra"> terra <span class="brand-count">5</span>
          </label>
        </div>
      </section>

      <!-- 4. CUSTOMER RATINGS (radio) -->
      <section class="filter-section">
        <h3>⭐ customer rating</h3>
        <div class="rating-list" id="ratingFilterContainer">
          <label class="rating-option">
            <input type="radio" name="rating" value="4.5"> 
            <span class="stars">★★★★★</span> <span class="rating-label">4.5 & up</span>
          </label>
          <label class="rating-option">
            <input type="radio" name="rating" value="4"> 
            <span class="stars">★★★★☆<span class="inactive">★</span></span> <span class="rating-label">4.0 & up</span>
          </label>
          <label class="rating-option">
            <input type="radio" name="rating" value="3.5"> 
            <span class="stars">★★★☆☆<span class="inactive">★★</span></span> <span class="rating-label">3.5 & up</span>
          </label>
          <label class="rating-option">
            <input type="radio" name="rating" value="3"> 
            <span class="stars">★★★☆☆<span class="inactive">★★</span></span> <span class="rating-label">3.0 & up</span>
          </label>
          <label class="rating-option">
            <input type="radio" name="rating" value=""> 
            <span class="stars">☆☆☆☆☆</span> <span class="rating-label">any</span>
          </label>
        </div>
      </section>

      <div style="margin-top:1rem; font-size:0.8rem; color:#46799e; text-align:center;">
        ⚡ interactive filters (JS demo) · price, color, brand, rating
      </div>
    </aside>

    <!-- PRODUCT GRID AREA -->
    <main class="product-listing">
      <header class="results-header">
        <h1>discover <span id="productCount">12</span> items</h1>
        <div class="sort">sort by: featured ▼</div>
      </header>

      <!-- dynamic product grid (updated by filter) -->
      <div class="product-grid" id="productGrid">
        <!-- products injected via javascript -->
      </div>

      <!-- (optional) note: filter logic uses dataset) -->
      <footer style="color:#4a789b; padding:1rem 0; text-align:right;">⚡ advanced filters: price range, color, brand, rating</footer>
    </main>
  </div>

  <script>
    (function() {
      // ---------- PRODUCT DATA (rich with filter dimensions) ----------
      const products = [
        { id:1, name:'concrete backpack', brand:'urban', price:89, color:'black', rating:4.7, reviews:34, image:'🎒' },
        { id:2, name:'field jacket', brand:'nordic', price:215, color:'navy', rating:4.2, reviews:56, image:'🧥' },
        { id:3, name:'canvas tote', brand:'element', price:49, color:'sand', rating:3.8, reviews:21, image:'👜' },
        { id:4, name:'merino beanie', brand:'base', price:32, color:'clay', rating:4.5, reviews:17, image:'🧢' },
        { id:5, name:'leather wallet', brand:'terra', price:79, color:'black', rating:4.3, reviews:42, image:'👝' },
        { id:6, name:'sling bag', brand:'urban', price:65, color:'sage', rating:4.6, reviews:28, image:'🎒' },
        { id:7, name:'water bottle', brand:'nordic', price:28, color:'white', rating:4.0, reviews:63, image:'🧴' },
        { id:8, name:'sun hat', brand:'element', price:38, color:'sand', rating:3.9, reviews:12, image:'🧢' },
        { id:9, name:'wool scarf', brand:'base', price:45, color:'navy', rating:4.8, reviews:9, image:'🧣' },
        { id:10, name:'trek pants', brand:'terra', price:120, color:'sage', rating:4.4, reviews:31, image:'👖' },
        { id:11, name:'hoodie', brand:'urban', price:78, color:'clay', rating:4.1, reviews:47, image:'👕' },
        { id:12, name:'snow gloves', brand:'nordic', price:55, color:'black', rating:3.7, reviews:14, image:'🧤' },
      ];

      // references
      const productGrid = document.getElementById('productGrid');
      const productCountSpan = document.getElementById('productCount');

      // filter inputs
      const priceSlider = document.getElementById('priceSlider');
      const minPriceInput = document.getElementById('minPrice');
      const maxPriceInput = document.getElementById('maxPrice');

      const colorOptions = document.querySelectorAll('.color-option');
      const brandCheckboxes = document.querySelectorAll('#brandFilterContainer input[type="checkbox"]');
      const ratingRadios = document.querySelectorAll('#ratingFilterContainer input[type="radio"]');
      const clearBtn = document.getElementById('clearFiltersBtn');

      // state
      let selectedColors = new Set();        // multiple colors allowed
      let selectedBrands = new Set();
      let selectedRating = null;              // numeric minimum (eg 4.0)
      let maxPrice = 250, minPrice = 0;

      // helper: render products based on all filters
      function filterProducts() {
        // price range from inputs
        minPrice = parseFloat(minPriceInput.value) || 0;
        maxPrice = parseFloat(maxPriceInput.value) || 500;
        if (minPrice > maxPrice) { let tmp = minPrice; minPrice = maxPrice; maxPrice = tmp; }

        const ratingValue = selectedRating ? parseFloat(selectedRating) : 0;

        const filtered = products.filter(p => {
          // price
          if (p.price < minPrice || p.price > maxPrice) return false;
          // color (if any selected) -> if set not empty and product color not in set => exclude
          if (selectedColors.size > 0 && !selectedColors.has(p.color)) return false;
          // brand (if any selected)
          if (selectedBrands.size > 0 && !selectedBrands.has(p.brand)) return false;
          // rating (if selected rating > 0)
          if (ratingValue > 0 && p.rating < ratingValue) return false;
          return true;
        });

        renderProducts(filtered);
        productCountSpan.innerText = filtered.length;
      }

      // render product cards
      function renderProducts(productArray) {
        if (productArray.length === 0) {
          productGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem; background:#f4f9ff; border-radius:40px; color:#2a628b;">✨ no items match filters · try adjusting</div>`;
          return;
        }

        let html = '';
        productArray.forEach(p => {
          // star display (simplified)
          const fullStars = Math.floor(p.rating);
          const hasHalf = p.rating % 1 >= 0.5;
          let starsStr = '';
          for (let i=0; i<5; i++) {
            if (i < fullStars) starsStr += '★'; 
            else if (i === fullStars && hasHalf) starsStr += '½'; 
            else starsStr += '☆';
          }

          html += `
            <article class="product-card">
              <div class="product-image">${p.image}</div>
              <div class="product-brand">${p.brand}</div>
              <div class="product-title">${p.name}</div>
              <div class="product-rating">
                <span class="stars-small">${starsStr}</span>
                <span class="reviews">(${p.reviews})</span>
              </div>
              <div class="product-price">$${p.price}</div>
              <div><span class="product-color-dot" style="background:${p.color === 'black'?'#222':p.color==='white'?'#f0f0f0':p.color==='navy'?'#1f2f54':p.color==='sage'?'#8a9b7e':p.color==='clay'?'#b66d5b':'#dbb88c'};"></span> ${p.color}</div>
              <div class="product-footer">
                <button class="add-btn" aria-label="add to cart">add</button>
                <span>❤️</span>
              </div>
            </article>
          `;
        });
        productGrid.innerHTML = html;
      }

      // EVENT LISTENERS

      // price slider + inputs sync
      function updatePriceFromSlider() {
        maxPriceInput.value = priceSlider.value;
        filterProducts();
      }
      priceSlider.addEventListener('input', updatePriceFromSlider);
      
      minPriceInput.addEventListener('input', () => {
        filterProducts();
        // adjust slider background simplistically
      });
      maxPriceInput.addEventListener('input', () => {
        priceSlider.value = maxPriceInput.value;
        filterProducts();
      });

      // color clicks (toggle selection)
      colorOptions.forEach(opt => {
        opt.addEventListener('click', (e) => {
          const color = opt.dataset.color;
          if (selectedColors.has(color)) {
            selectedColors.delete(color);
            opt.classList.remove('selected');
          } else {
            selectedColors.add(color);
            opt.classList.add('selected');
          }
          filterProducts();
        });
      });

      // brand checkboxes
      brandCheckboxes.forEach(cb => {
        cb.addEventListener('change', () => {
          selectedBrands.clear();
          brandCheckboxes.forEach(c => { if(c.checked) selectedBrands.add(c.value); });
          filterProducts();
        });
      });

      // rating radios
      ratingRadios.forEach(r => {
        r.addEventListener('change', () => {
          if (r.checked) {
            selectedRating = r.value ? parseFloat(r.value) : null;  // null if empty (any)
          }
          filterProducts();
        });
      });

      // clear all filters
      clearBtn.addEventListener('click', () => {
        // reset price range
        minPriceInput.value = 0;
        maxPriceInput.value = 250;
        priceSlider.value = 250;
        // clear colors
        selectedColors.clear();
        colorOptions.forEach(opt => opt.classList.remove('selected'));
        // clear brands
        brandCheckboxes.forEach(c => { c.checked = false; });
        selectedBrands.clear();
        // clear rating (set "any")
        ratingRadios.forEach(r => { if (r.value === "") r.checked = true; else r.checked = false; });
        selectedRating = null;
        
        filterProducts();
      });

      // set default rating "any" to true
      document.querySelector('#ratingFilterContainer input[value=""]').checked = true;
      
      // initial render
      filterProducts();
    })();
  </script>
</body>
</html>
